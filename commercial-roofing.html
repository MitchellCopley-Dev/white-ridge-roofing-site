<body class="bg-white text-slate-900">
    <nav class="flex items-center justify-between px-6 py-4 bg-white shadow-sm border-b sticky top-0 z-40">

        <div class="hidden md:block space-x-6 font-medium">
            <a href="index.html" class="hover:text-orange-600">Home</a>

    <section id="commercial-form" class="py-20 px-6 bg-slate-50">
        <div class="max-w-4xl mx-auto bg-white p-10 rounded-3xl border shadow-lg">
            <h2 class="text-3xl font-bold text-center mb-8">Get a Commercial Quote</h2>
            <form name="commercial-leads" method="POST" data-netlify="true" action="/success.html" class="grid md:grid-cols-2 gap-6">
                <input type="text" name="business-name" placeholder="Business Name" class="p-4 border rounded-xl" required>

                <input type="tel" name="phone" placeholder="Phone Number" class="p-4 border rounded-xl" required>
                <input type="email" name="email" placeholder="Email Address" class="p-4 border rounded-xl" required>
                <textarea name="details" placeholder="Project Details" class="md:col-span-2 p-4 border rounded-xl h-32"></textarea>
                <button type="submit" class="md:col-span-2 bg-slate-900 text-white font-bold py-4 rounded-xl text-xl hover:bg-black transition">Submit Request</button>
            </form>
        </div>
    </section>
